<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400, height=300">
<title>Schaaq Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 400px;
    height: 300px;
    overflow: hidden;
    background: #0A0F1A;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-app-region: drag;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 40px 20px 28px;
  }

  .logo {
    width: 72px;
    height: 72px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.1s forwards;
  }

  .app-name {
    font-size: 18px;
    font-weight: 500;
    color: #e6edf3;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.25s forwards;
  }

  .version {
    font-size: 11px;
    color: #484f58;
    letter-spacing: 0.5px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.4s forwards;
  }

  .dots {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.55s forwards;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #b0b8c4;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .status {
    font-size: 11px;
    color: #30363d;
    letter-spacing: 0.3px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.7s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
    40%           { opacity: 1;    transform: scale(1); }
  }
</style>
</head>
<body>
<div class="container">
  <svg class="logo" viewBox="0 0 512 512" width="72" height="72">
    <rect width="512" height="512" rx="96" fill="#0d1117"/>
    <text x="256" y="380" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic" font-weight="400"
          font-size="420" fill="#b0b8c4">q</text>
  </svg>
  <div class="app-name">Schaaq Scanner</div>
  <div class="version">v{{VERSION}}</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="status">Starting&hellip;</div>
</div>
</body>
</html>
